name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v3

      - name: Build du JAR Spring Boot
        run: |
          cd springboot/app
          mvn clean package

      - name: Connexion à Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image Backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app ./springboot/app

      - name: Push image Backend
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app

      - name: Build image Frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app ./angular-app

      - name: Push image Frontend
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app

      - name: Test avec Docker Compose
        run: |
          docker-compose up -d
          sleep 40
          docker ps
